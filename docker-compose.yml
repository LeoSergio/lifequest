services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: lifequest_user
      POSTGRES_PASSWORD: lifequest_password
      POSTGRES_DB: lifequest_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://lifequest_user:lifequest_password@db:5432/lifequest_db
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  guildas:
    build: ./guildas
    ports:
      - "8001:8001"
    env_file:
      - ./guildas/.env
    volumes:
      - ./guildas/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

# O frontend NÃO entra aqui: é um PWA local-first, roda direto com `npm run dev`
# na máquina do dev (não precisa de container, e recarrega mais rápido assim).

volumes:
  postgres_data:
